name: Deploy to Vercel

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  # Required project secrets:
  # - VERCEL_AUTH_API_PROJECT_ID
  # - VERCEL_CORE_API_PROJECT_ID
  # - VERCEL_AI_API_PROJECT_ID
  # - VERCEL_UI_PROJECT_ID

jobs:
  deploy-apps:
    name: Deploy ${{ matrix.app }}
    runs-on: ubuntu-latest
    environment: Production
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: auth-api
            project_id: ${{ secrets.VERCEL_AUTH_API_PROJECT_ID }}
          - app: core-api
            project_id: ${{ secrets.VERCEL_CORE_API_PROJECT_ID }}
          - app: ai-api
            project_id: ${{ secrets.VERCEL_AI_API_PROJECT_ID }}
          - app: web-ui
            project_id: ${{ secrets.VERCEL_UI_PROJECT_ID }}
    env:
      VERCEL_PROJECT_ID: ${{ matrix.project_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Environment
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/${{ matrix.app }}

      - name: Build
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/${{ matrix.app }}

      - name: Deploy
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/${{ matrix.app }}
