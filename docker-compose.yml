services:
  postgres:
    image: postgres:17-alpine
    container_name: done-auth-postgres
    environment:
      POSTGRES_USER: database_user
      POSTGRES_PASSWORD: database_password
      POSTGRES_DB: database_name
    volumes:
      - auth-api-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - done-network

networks:
  done-network:

volumes:
  auth-api-postgres-data:
